services:
  backend:
    build:
      context: ./backend
    container_name: gs1-udi-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:///./data/udi.db
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/outputs:/app/outputs

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:18000}
    container_name: gs1-udi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
