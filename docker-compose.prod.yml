services:
  postgres:
    image: postgres:16-alpine
    container_name: gs1-udi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gs1udi}
      POSTGRES_USER: ${POSTGRES_USER:-gs1user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gs1pass}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gs1user} -d ${POSTGRES_DB:-gs1udi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: gs1-udi-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gs1user}:${POSTGRES_PASSWORD:-gs1pass}@postgres:5432/${POSTGRES_DB:-gs1udi}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY:-""}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      WORKERS: ${WORKERS:-4}
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: gs1-udi-redis
    restart: unless-stopped
    volumes:
      - redis_prod_data:/data

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    container_name: gs1-udi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:3000"

volumes:
  postgres_prod_data:
  redis_prod_data:
