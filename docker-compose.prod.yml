services:
  postgres:
    image: postgres:16-alpine
    container_name: gs1-udi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gs1udi}
      POSTGRES_USER: ${POSTGRES_USER:-gs1user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gs1user} -d ${POSTGRES_DB:-gs1udi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  backend:
    build:
      context: ./backend
    container_name: gs1-udi-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gs1user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-gs1udi}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      ENABLE_AUTH: ${ENABLE_AUTH:-true}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in production}
      RESEND_API_KEY: ${RESEND_API_KEY:-""}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL must be set (e.g. https://yourdomain.com)}
      # With nginx as single entry point, CORS_ORIGINS = same origin as frontend
      CORS_ORIGINS: ${FRONTEND_URL:?FRONTEND_URL must be set}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}  # set true only after HTTPS is configured
      # 2-core server: 2 workers ≈ optimal (avoids OOM with 2 GB RAM)
      # Formula: 2 × CPU_cores is safe; do NOT set above 3 on 2 GB
      WORKERS: ${WORKERS:-2}
    # No ports exposed — only reachable via nginx on the internal network
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 400m

  redis:
    image: redis:7-alpine
    container_name: gs1-udi-redis
    restart: unless-stopped
    # Require password authentication — REDIS_PASSWORD must be set in .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      # $$REDIS_PASSWORD → $REDIS_PASSWORD inside the container shell
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64m

  frontend:
    build:
      context: ./frontend
      args:
        # BACKEND_URL points to internal backend — Next.js rewrites proxy /api/* server-side
        BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_ENABLE_AUTH: ${ENABLE_AUTH:-true}
    container_name: gs1-udi-frontend
    restart: unless-stopped
    # No ports exposed — only reachable via nginx on the internal network
    expose:
      - "3000"
    healthcheck:
      # Next.js is ready when it responds to any HTTP request
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m

  nginx:
    image: nginx:1.27-alpine
    container_name: gs1-udi-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount SSL certs here when HTTPS is enabled:
      # - /etc/letsencrypt/live/${DOMAIN}:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 32m

volumes:
  postgres_prod_data:
  redis_prod_data:
