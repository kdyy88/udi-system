# ── GS1 UDI System — Nginx Reverse Proxy ─────────────────────────────────────
#
# Routing rules:
#   /api/*   → backend:8000   (FastAPI, internal only)
#   /*       → frontend:3000  (Next.js, internal only)
#
# SSL: mount your cert/key into /etc/nginx/certs/ and uncomment the HTTPS block.
# For Let's Encrypt, replace cert paths with /etc/letsencrypt/live/<domain>/*.pem
# ─────────────────────────────────────────────────────────────────────────────

worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 20M;   # allow up to 20 MB Excel uploads

    # ── Gzip compression ────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml
                      application/json application/javascript application/xml+rss
                      image/svg+xml font/woff2;

    # ── Upstream services ────────────────────────────────────────────────────

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ── HTTP → HTTPS redirect (uncomment when SSL is ready) ──────────────────
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ── Main server block ────────────────────────────────────────────────────

    server {
        listen 80;          # change to 443 ssl when SSL is enabled
        server_name _;      # replace with your domain if needed

        # ── SSL (uncomment and fill cert paths to enable HTTPS) ──────────────
        # ssl_certificate     /etc/nginx/certs/fullchain.pem;
        # ssl_certificate_key /etc/nginx/certs/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 10m;
        # add_header Strict-Transport-Security "max-age=31536000" always;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Content-Type-Options  "nosniff"          always;
        add_header X-Frame-Options         "SAMEORIGIN"       always;
        add_header Referrer-Policy         "strict-origin"    always;

        # ── Next.js immutable static assets ────────────────────────────────
        # These paths include a content hash so they are safe to cache forever.
        location /_next/static/ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            add_header         Cache-Control "public, max-age=31536000, immutable";
        }

        # ── API: proxy to FastAPI backend ─────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Frontend: proxy to Next.js ────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 60s;
        }
    }
}
