services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gs1udi
      POSTGRES_USER: gs1user
      POSTGRES_PASSWORD: gs1pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gs1user -d gs1udi"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://gs1user:gs1pass@postgres:5432/gs1udi
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    command:
      - bash
      - -lc
      - |
        set -e
        apt-get update -qq && apt-get install -y -qq ghostscript
        pip install uv -q
        uv sync
        uv run alembic upgrade head
        uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    environment:
      CI: "true"
    command: ["sh", "-lc", "corepack enable && pnpm install && pnpm dev --hostname 0.0.0.0 --port 3000"]
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_dev_data:
