version: "3.9"

services:
  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    volumes:
      - ./:/app
    command: ["bash", "-lc", "pip install uv && uv sync && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"]
    ports:
      - "8000:8000"

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    command: ["sh", "-lc", "corepack enable && pnpm install && pnpm dev --hostname 0.0.0.0 --port 3000"]
    ports:
      - "3000:3000"
    depends_on:
      - backend
